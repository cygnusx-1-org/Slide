plugins {
    id 'com.android.application'
    id 'com.gladed.androidgitversion' version '0.4.14'
    id 'com.github.ben-manes.versions' version '0.54.0'
    id 'com.github.breadmoirai.github-release' version '2.5.2'
    id 'com.diffplug.spotless' version '8.8.0'
    id 'io.github.takahirom.roborazzi' version '1.64.0'
    id 'jacoco'
}

jacoco {
    // 0.8.13+ is required to read Java 24 (class-file major 68) bytecode.
    toolVersion = '0.8.15'
}

android {
    compileSdk 37
    namespace = "me.edgan.redditslide"

    // APK/AAB custom names are applied via the new Variant API (androidComponents block at the end
    // of this file). AGP 9's new DSL removed applicationVariants.outputs.outputFileName.

    defaultConfig {
        applicationId "me.edgan.redditslide"
        minSdk 29
        targetSdk 36
        versionCode 783
        versionName androidGitVersion.name()
    }

    flavorDimensions "variant"
    productFlavors {
        withGPlay {
            dimension "variant"
            buildConfigField "boolean", "isFDroid", "false"
        }
        noGPlay {
            dimension "variant"
            buildConfigField "boolean", "isFDroid", "true"
        }
    }

    def keystorePropertiesFile = rootProject.file("keystore.properties")

    if (keystorePropertiesFile.exists()) {
        def keystoreProperties = new Properties()
        keystoreProperties.load(new FileInputStream(keystorePropertiesFile))

        signingConfigs {
            withGPlay {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    } else {
        println("Warning: keystore.properties file not found. Skipping signing configuration for withGPlay.")
    }


    buildTypes {
        release {
            if (keystorePropertiesFile.exists()) {
                signingConfig = signingConfigs.withGPlay
            } else {
                println("Warning: keystore.properties file not found. Skipping signing configuration for release.")
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            resValue "string", "app_name", "Slide"
        }
        debug {
            applicationIdSuffix ".debug"
            resValue "string", "app_name", "Slide Debug"
        }
    }

    packaging {
        resources {
            excludes += 'META-INF/*'
        }
    }

    compileOptions {
        encoding = "UTF-8"
        sourceCompatibility JavaVersion.VERSION_24
        targetCompatibility JavaVersion.VERSION_24
    }

    lint {
        // Lint errors are kept at zero; fail the build if a new one is introduced.
        // Warnings do not abort (see the large existing warning backlog).
        abortOnError = true
        // Translations are crowd-sourced. ImpliedQuantity fires on the count-less
        // abbreviation plurals (points -> "pt"/"pts", comments -> "cmt"/"cmts")
        // whose quantity is rendered separately, so no %d belongs in the string;
        // this is inherent to Slavic/Romance plural rules and recurs per locale.
        disable 'MissingTranslation', 'ExtraTranslation', 'ImpliedQuantity',
                'StaticFieldLeak', 'ClickableViewAccessibility', 'NotSibling'
    }

    testOptions {
        unitTests {
            includeAndroidResources = true
            returnDefaultValues = true
            all {
                jvmArgs = [
                    '-Xshare:off',
                    '--add-opens=java.base/java.lang=ALL-UNNAMED',
                    '--add-opens=java.base/java.util=ALL-UNNAMED',
                    '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED',
                    '--add-opens=java.base/java.util.regex=ALL-UNNAMED'
                ]
                jacoco {
                    includeNoLocationClasses = true
                    excludes = ['jdk.internal.*']
                }
            }
        }
    }

    buildFeatures {
        dataBinding = true
        viewBinding = true
        // Required because build types use resValue (release/debug app_name); the global
        // android.defaults.buildfeatures.resvalues default is off in AGP 9.
        resValues = true
    }
}

// JaCoCo line/branch coverage for the default (withGPlayDebug) unit-test variant.
// Run: ./gradlew jacocoWithGPlayDebugUnitTestReport ; report at
// app/build/reports/jacoco/jacocoWithGPlayDebugUnitTestReport/html/index.html
tasks.register('jacocoWithGPlayDebugUnitTestReport', JacocoReport) {
    dependsOn 'testWithGPlayDebugUnitTest'
    group = 'verification'
    description = 'Generates JaCoCo coverage from the withGPlayDebug unit tests.'

    def coverageExcludes = [
        '**/R.class', '**/R$*.class', '**/BuildConfig.*', '**/Manifest*.*',
        '**/*Test*.*', '**/databinding/**', '**/*_ViewBinding*.*',
        '**/*Binding.*', '**/*Binding$*.*', 'android/**/*.*'
    ]

    // JaCoCo resolves package names from the class bytes, so rooting at the variant's javac output
    // and collecting every .class works regardless of the intermediate directory layout. Paths are
    // wrapped lazily (providers) so nothing is resolved at configuration time.
    classDirectories.setFrom(
        layout.buildDirectory.dir('intermediates/javac/withGPlayDebug').map { dir ->
            fileTree(dir: dir.asFile, excludes: coverageExcludes)
        })
    sourceDirectories.setFrom(files(['src/main/java']))
    // AGP writes the unit-test coverage data under these two locations; scope to them rather than
    // scanning the whole build directory.
    executionData.setFrom(
        layout.buildDirectory.map { buildDir ->
            fileTree(dir: buildDir.asFile, includes: [
                'outputs/unit_test_code_coverage/withGPlayDebugUnitTest/testWithGPlayDebugUnitTest.exec',
                'jacoco/testWithGPlayDebugUnitTest.exec'
            ])
        })

    reports {
        xml.required = true
        html.required = true
    }
}

configurations {
    all {
        exclude module: 'httpclient'
    }
}

def githubPropertiesFile = rootProject.file("github.properties")

if (githubPropertiesFile.exists()) {
    def githubProperties = new Properties()
    githubProperties.load(new FileInputStream(githubPropertiesFile))

    githubRelease {
        def releaseNotes = System.getenv("RELEASE_NOTES") ?: "Automated release of version ${android.defaultConfig.versionName ?: "default-version"}"

        token = githubProperties["githubToken"]
        owner = "edgan"
        repo = "Slide"
        tagName = android.defaultConfig.versionName ?: "default-version"
        targetCommitish = "master"
        releaseName = "Release ${android.defaultConfig.versionName ?: "default-version"}"
        body = "$releaseNotes"
        draft = false
        prerelease = false
        overwrite = false

        // Dynamically set releaseAssets by searching the APK path
        def apkFiles = fileTree(dir: "build/outputs/apk/withGPlay/release/", include: "*.apk").files.toList()
        if (apkFiles.isEmpty()) {
            println("Warning: No APK files found in the directory 'build/outputs/apk/withGPlay/release/'.")
        } else {
            releaseAssets = apkFiles
        }
    }
} else {
    println("Warning: github.properties file not found. Skipping GitHub release configuration.")
}

