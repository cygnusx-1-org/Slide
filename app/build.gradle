import com.android.build.gradle.internal.tasks.FinalizeBundleTask
import java.util.Properties

plugins {
    id 'com.android.application'
    id 'com.gladed.androidgitversion' version '0.4.14'
    id 'com.github.ben-manes.versions' version '0.54.0'
    id 'com.github.breadmoirai.github-release' version '2.5.2'
    id 'com.diffplug.spotless' version '8.5.1'
}

android {
    compileSdk 36
    namespace "me.edgan.redditslide"


    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def appName = "slide"
            def buildType = variant.buildType
            def flavors = variant.productFlavors.collect { it.name }.join("-") ?: "noFlavor"
            def versionCode = variant.versionCode
            def versionName = variant.versionName
            def artifactName = "${appName}-${flavors}-${versionName}(${versionCode})"

            if (flavors.contains("withGPlay")) {
                artifactName = "${appName}-${versionName}"
            } else if (flavors.contains("noGPlay")) {
                artifactName = "${appName}-${flavors}-${versionName}"
            } else if (buildType == "debug") {
                artifactName = "${appName}-${buildType}-${versionName}"
            }

            // Assign the apk filename
            output.outputFileName = "${artifactName}.apk"

            // Rename bundle
            tasks.named("sign${variant.name.capitalize()}Bundle", FinalizeBundleTask) {
                File file = finalBundleFile.asFile.get()
                File finalFile = new File(file.parentFile, "${artifactName}.aab")
                finalBundleFile.set(finalFile)
            }
        }
    }

    defaultConfig {
        applicationId "me.edgan.redditslide"
        minSdk 29
        targetSdk 36
        versionCode 774
        versionName androidGitVersion.name()
    }

    flavorDimensions "variant"
    productFlavors {
        withGPlay {
            dimension "variant"
            buildConfigField "boolean", "isFDroid", "false"
        }
        noGPlay {
            dimension "variant"
            buildConfigField "boolean", "isFDroid", "true"
        }
    }

    def keystorePropertiesFile = rootProject.file("keystore.properties")

    if (keystorePropertiesFile.exists()) {
        def keystoreProperties = new Properties()
        keystoreProperties.load(new FileInputStream(keystorePropertiesFile))

        signingConfigs {
            withGPlay {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    } else {
        println("Warning: keystore.properties file not found. Skipping signing configuration for withGPlay.")
    }


    buildTypes {
        release {
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.withGPlay
            } else {
                println("Warning: keystore.properties file not found. Skipping signing configuration for release.")
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            resValue "string", "app_name", "Slide"
        }
        debug {
            applicationIdSuffix ".debug"
            resValue "string", "app_name", "Slide Debug"
        }
    }

    packaging {
        resources {
            excludes += 'META-INF/*'
        }
    }

    compileOptions {
        encoding "UTF-8"
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    lint {
        // Lint errors are kept at zero; fail the build if a new one is introduced.
        // Warnings do not abort (see the large existing warning backlog).
        abortOnError true
        // Translations are crowd-sourced. ImpliedQuantity fires on the count-less
        // abbreviation plurals (points -> "pt"/"pts", comments -> "cmt"/"cmts")
        // whose quantity is rendered separately, so no %d belongs in the string;
        // this is inherent to Slavic/Romance plural rules and recurs per locale.
        disable 'MissingTranslation', 'ExtraTranslation', 'ImpliedQuantity',
                'StaticFieldLeak', 'ClickableViewAccessibility', 'NotSibling'
    }

    testOptions {
        unitTests {
            includeAndroidResources true
            returnDefaultValues = true
            all {
                jvmArgs = [
                    '-Xshare:off',
                    '--add-opens=java.base/java.lang=ALL-UNNAMED',
                    '--add-opens=java.base/java.util=ALL-UNNAMED',
                    '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED',
                    '--add-opens=java.base/java.util.regex=ALL-UNNAMED'
                ]
            }
        }
    }

    buildFeatures {
        dataBinding true
        viewBinding true
    }
}

configurations {
    all {
        exclude module: 'httpclient'
    }
}

def githubPropertiesFile = rootProject.file("github.properties")

if (githubPropertiesFile.exists()) {
    def githubProperties = new Properties()
    githubProperties.load(new FileInputStream(githubPropertiesFile))

    githubRelease {
        def releaseNotes = System.getenv("RELEASE_NOTES") ?: "Automated release of version ${android.defaultConfig.versionName ?: "default-version"}"

        token = githubProperties["githubToken"]
        owner = "edgan"
        repo = "Slide"
        tagName = android.defaultConfig.versionName ?: "default-version"
        targetCommitish = "master"
        releaseName = "Release ${android.defaultConfig.versionName ?: "default-version"}"
        body = "$releaseNotes"
        draft = false
        prerelease = false
        overwrite = false

        // Dynamically set releaseAssets by searching the APK path
        def apkFiles = fileTree(dir: "build/outputs/apk/withGPlay/release/", include: "*.apk").files.toList()
        if (apkFiles.isEmpty()) {
            println("Warning: No APK files found in the directory 'build/outputs/apk/withGPlay/release/'.")
        } else {
            releaseAssets = apkFiles
        }
    }
} else {
    println("Warning: github.properties file not found. Skipping GitHub release configuration.")
}

dependencies {
/** Flavors **/
    // For Google Sign-In
    withGPlayImplementation 'com.google.android.gms:play-services-auth:20.6.0'
    // For the REST API Client
    withGPlayImplementation 'com.google.http-client:google-http-client:2.1.0'
    withGPlayImplementation 'com.google.api-client:google-api-client-android:2.7.1'
    withGPlayImplementation 'com.google.api-client:google-api-client-gson:2.7.1'
    withGPlayImplementation 'com.google.apis:google-api-services-drive:v3-rev20241206-2.0.0'

/** Custom **/
    implementation 'com.github.edgan:JRAW:e5e405835e'

    // Stock commonmark 0.13.0 (Apache-2.0) — shared by Slide's richtext/editor code and
    // Markwon. Replaced the old Haptic-Apps fork (commonmark 0.5.0 + a one-line heading
    // tweak) so a single commonmark is on the classpath; see issue #179.
    def commonmarkVersion = '0.13.0'
    implementation "com.atlassian.commonmark:commonmark:$commonmarkVersion"
    implementation "com.atlassian.commonmark:commonmark-ext-gfm-strikethrough:$commonmarkVersion"
    implementation "com.atlassian.commonmark:commonmark-ext-gfm-tables:$commonmarkVersion"
    implementation 'com.github.Haptic-Apps:JReadability:bb291880a5'
    implementation 'com.github.edgan:Android-RobotoTextView:d368c94b3c'

    // Markwon (Apache-2.0) — Continuum-style markdown renderer (issue #179).
    // GPL-compatible library; Reddit-specific plugins are written clean-room in-tree.
    def markwonVersion = '4.6.2'
    implementation "io.noties.markwon:core:$markwonVersion"
    implementation "io.noties.markwon:ext-strikethrough:$markwonVersion"
    implementation "io.noties.markwon:ext-tables:$markwonVersion"
    implementation "io.noties.markwon:linkify:$markwonVersion"
    implementation "io.noties.markwon:inline-parser:$markwonVersion"

/** AndroidX **/
    implementation 'androidx.activity:activity:1.13.0'
    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation 'androidx.browser:browser:1.10.0'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'androidx.core:core:1.18.0'
    implementation 'androidx.fragment:fragment:1.8.9'
    implementation 'androidx.media:media:1.8.0'
    implementation 'androidx.recyclerview:recyclerview:1.4.0'
    implementation 'androidx.webkit:webkit:1.16.0'
    implementation 'com.google.android.material:material:1.13.0'
    implementation "androidx.concurrent:concurrent-futures:1.3.0"
    implementation "androidx.lifecycle:lifecycle-runtime:2.10.0"
    implementation "androidx.databinding:databinding-runtime:8.13.2"
    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.2.0"
/** ExoPlayer **/
    // Application level media player
    implementation "androidx.media3:media3-exoplayer:1.10.1"
    implementation "androidx.media3:media3-ui:1.10.1"
    implementation "androidx.media3:media3-common:1.10.1"
    implementation("androidx.media3:media3-exoplayer-dash:1.10.1")
    implementation "androidx.media3:media3-datasource-okhttp:1.10.1"

/** Third-party **/
    // Good for debugging JRAW
    //implementation 'org.slf4j:slf4j-android:1.7.36'

    // QR code scanning
    implementation 'com.journeyapps:zxing-android-embedded:4.3.0'

/**** Frontend (UI-related) ****/

    // Color picker (used by the in-app Draw screen)
    implementation 'com.github.skydoves:colorpickerview:2.3.0'

    // Snackbar engagement for rating
    implementation 'com.github.ligi.snackengage:snackengage-core:0.30'
    implementation 'com.github.ligi.snackengage:snackengage-playrate:0.30'

    // Image loading, caching, and displaying
    //  NOTE: Replace with Glide/Picasso
    // com.nostra13.universalimageloader:universal-image-loader
    implementation 'com.github.edgan:Android-Universal-Image-Loader:644f0269eb@aar'

    // Custom image view for photo galleries and large images
    implementation 'com.github.davemorrissey:subsampling-scale-image-view:173e421fdb'

    // Image cropping
    implementation 'com.vanniktech:android-image-cropper:4.7.0'

    // Blurring
    implementation 'com.github.wasabeef:Blurry:4.0.0'

    // Draggable sliding up panel

    // Floating action button menu implementation
    implementation 'com.nambimobile.widgets:expandable-fab:1.2.1'

    // RecyclerView animations
    implementation 'com.mikepenz:itemanimators:1.1.0@aar'

    // iOS-like over-scrolling effect
    implementation 'io.github.everythingme:overscroll-decor-android:1.1.1'

    // Library information
    implementation 'com.mikepenz:aboutlibraries:14.2.1'

/**** Backend logic ****/

    implementation 'androidx.documentfile:documentfile:1.1.0'

    // Core Java libraries from Google
    implementation 'com.google.guava:guava:33.6.0-android'

    // Application restarting
    implementation 'com.jakewharton:process-phoenix:3.0.0'

    // KV store based on SQLite
    //  equal to 0.1.0, but we can't use jcenter
    implementation 'com.github.lusfold:AndroidKeyValueStore:620c363'

    // Helper utilities for the java.lang API
    implementation 'org.apache.commons:commons-lang3:3.20.0'

    // Algorithms working on strings
    implementation 'org.apache.commons:commons-text:1.15.0'

    // Utilities to assist with developing IO functionality
    implementation 'commons-io:commons-io:2.22.0'


    // HTTP client
    // BOM aligns okhttp, okhttp-android, and the okhttp-urlconnection that JRAW
    // pulls transitively (JavaNetCookieJar) so they don't skew across major versions.
    implementation platform('com.squareup.okhttp3:okhttp-bom:5.4.0')
    implementation 'com.squareup.okhttp3:okhttp'
    implementation 'com.squareup.okhttp3:okhttp-urlconnection'

    // Convert Java objects into JSON and back
    implementation 'com.google.code.gson:gson:2.14.0'

    // Read, write, and create MP4 files
    implementation 'org.mp4parser:isoparser:1.9.56'
    implementation 'org.mp4parser:muxer:1.9.56'

    implementation 'com.fasterxml.jackson.core:jackson-databind:2.21.3'

/** Testing **/
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:5.23.0'
    testImplementation 'org.robolectric:robolectric:4.16.1'
    testImplementation 'androidx.test:core:1.7.0'
    testImplementation 'org.hamcrest:hamcrest:3.0'
}

spotless {
    java {
        target '**/*.java'
        importOrder()
        removeUnusedImports()
        trimTrailingWhitespace()
        leadingTabsToSpaces(4)
    }
    format 'misc', {
        target '**/*.gradle', '**/*.md', '**/.gitignore'
        leadingTabsToSpaces(4)
        trimTrailingWhitespace()
    }
    format 'xml', {
        target '**/*.xml'
        leadingTabsToSpaces(4)
        trimTrailingWhitespace()
    }
}

// Static audit: every AppCompat AlertDialog must apply the themed card_background, otherwise it
// renders with the gray AppCompat default. See scripts/audit_dialog_backgrounds.sh. Wired into
// `check` so a new unwrapped/unmatched dialog fails the build.
tasks.register('auditDialogBackgrounds', Exec) {
    group = 'verification'
    description = 'Verify every AppCompat AlertDialog applies card_background (no gray dialogs).'
    workingDir = rootDir
    commandLine 'bash', "${rootDir}/scripts/audit_dialog_backgrounds.sh"
}
tasks.named('check') { dependsOn 'auditDialogBackgrounds' }
