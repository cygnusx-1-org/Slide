// Static audit: every AppCompat AlertDialog must apply the themed card_background, otherwise it
// renders with the gray AppCompat default. See scripts/audit_dialog_backgrounds.sh. Wired into
// `check` so a new unwrapped/unmatched dialog fails the build.
tasks.register('auditDialogBackgrounds', Exec) {
    group = 'verification'
    description = 'Verify every AppCompat AlertDialog applies card_background (no gray dialogs).'
    workingDir = rootDir
    commandLine 'bash', "${rootDir}/scripts/audit_dialog_backgrounds.sh"
}
tasks.named('check') { dependsOn 'auditDialogBackgrounds' }

// Custom APK/AAB names, reimplemented on AGP 9's new Variant API (the legacy
// applicationVariants.outputs.outputFileName / bundle rename was removed by the new DSL).
// Naming rules preserved from before: withGPlay -> "slide-<versionName>", noGPlay ->
// "slide-noGPlay-<versionName>". versionName is androidGitVersion.name(), constant across variants.
def bundleBaseNames = [:]
androidComponents {
    onVariants(selector().all()) { variant ->
        def flavor = variant.flavorName
        def baseName = (flavor != null && flavor.contains("withGPlay"))
            ? "slide-${android.defaultConfig.versionName}".toString()
            : "slide-${flavor}-${android.defaultConfig.versionName}".toString()
        bundleBaseNames[variant.name] = baseName

        // Rename the APK (Slide ships a single universal APK per variant; no ABI splits).
        def renameProvider = tasks.register("rename${variant.name.capitalize()}Apks", RenameApksTask) {
            it.baseName.set(baseName)
        }
        def request = variant.artifacts.use(renameProvider)
            .wiredWithDirectories(
                { it.getApkFolder() } as kotlin.jvm.functions.Function1,
                { it.getOutFolder() } as kotlin.jvm.functions.Function1)
            .toTransformMany(SingleArtifact.APK.INSTANCE)
        renameProvider.configure { it.transformationRequest.set(request) }
    }
}

// Rename the AAB bundle. Done in a late afterEvaluate (not inside androidComponents) so this set
// runs after AGP's own configuration and wins; the target is built from AGP's stable bundle output
// dir rather than reading finalBundleFile.get(), which has no value this early under AGP 9.
project.afterEvaluate {
    bundleBaseNames.each { variantName, baseName ->
        def taskName = "sign${variantName.capitalize()}Bundle"
        if (tasks.names.contains(taskName)) {
            tasks.named(taskName, FinalizeBundleTask).configure { task ->
                task.finalBundleFile.set(
                    layout.buildDirectory.file("outputs/bundle/${variantName}/${baseName}.aab"))
            }
        }
    }
}

interface CopyApkParameters extends WorkParameters, Serializable {
    RegularFileProperty getInputApkFile()
    RegularFileProperty getOutputApkFile()
}

abstract class CopyApkWorkAction implements WorkAction<CopyApkParameters> {
    @Override
    void execute() {
        def output = parameters.outputApkFile.get().asFile
        output.delete()
        java.nio.file.Files.copy(parameters.inputApkFile.get().asFile.toPath(), output.toPath())
    }
}

abstract class RenameApksTask extends DefaultTask {
    @Input
    abstract Property<String> getBaseName()

    @InputFiles
    abstract DirectoryProperty getApkFolder()

    @OutputDirectory
    abstract DirectoryProperty getOutFolder()

    @Internal
    abstract Property<ArtifactTransformationRequest<RenameApksTask>> getTransformationRequest()

    private final WorkerExecutor workerExecutor

    @Inject
    RenameApksTask(WorkerExecutor workerExecutor) {
        this.workerExecutor = workerExecutor
    }

    @TaskAction
    void taskAction() {
        // Wipe stale APKs from previous builds so an old versionName file (e.g. slide-7.7.8.apk)
        // doesn't linger beside the current one (slide-7.7.9.apk). versionName is git-derived, so
        // the filename changes every release and the leftovers would otherwise accumulate here and
        // get swept up by the GitHub release upload's "*.apk" glob.
        outFolder.get().asFile.listFiles(
            { File f -> f.name.endsWith(".apk") } as java.io.FileFilter)?.each { it.delete() }

        transformationRequest.get().submit(
            this,
            workerExecutor.noIsolation(),
            CopyApkWorkAction.class,
            { BuiltArtifact builtArtifact, Directory outputLocation, CopyApkParameters params ->
                def newName = "${baseName.get()}.apk"
                params.inputApkFile.set(new File(builtArtifact.outputFile))
                params.outputApkFile.set(new File(outputLocation.asFile, newName as String))
                return params.outputApkFile.get().asFile
            } as kotlin.jvm.functions.Function3
        )
    }
}

// ---------------------------------------------------------------------------
// assemble<Variant>Remote / install<Variant>Remote — compile on the Mirakle remote
// host, then leave the APK in the local output dir (assemble) or additionally
// install it via LOCAL adb (install)
// ---------------------------------------------------------------------------
// Mirakle offloads an ENTIRE gradlew invocation to the remote host (boson) or none of
// it: the global init script (~/.gradle/init.d/mirakle.gradle) decides once from the
// task names, and its force-local guard pins any task whose simple name starts with
// "install" (also connected/spotless/lint/clean) or ENDS with "remote" to THIS machine,
// so device/adb tasks reach the locally-connected device. A single invocation that
// compiles remotely yet installs locally is therefore impossible.
//
// These tasks bridge it. Every task registered here is force-local by the guard — the
// install ones by their "install" prefix, all of them by their "Remote" suffix — so the
// guard keeps this OUTER invocation local. Its action shells out to a nested
// `./gradlew :app:assemble<Variant>` — a fresh invocation whose "assemble…" task name is
// NOT force-local, so Mirakle offloads that compile to boson and rsyncs the built APK
// back into build/outputs/apk/<flavor>/<buildType>/. install<Variant>Remote then installs
// that APK with the local SDK's adb. Slide ships one universal APK per variant (no ABI
// splits), so there is no per-ABI selection to do.
//
// The guard's "Remote" suffix rule is what makes assemble<Variant>Remote work at all:
// "assembleWithGPlayReleaseRemote" is not caught by any of the force-local PREFIXES, so
// without that rule the outer invocation would itself be offloaded, the BUILD SUCCESSFUL
// check below would run on boson, and the caller would be back to reading Mirakle's
// unreliable local wrapper exit code — exactly what these tasks exist to avoid.
//
// Success is judged from the remote "BUILD SUCCESSFUL" line, not solely the wrapper exit
// code: Mirakle's local wrapper has historically exited 1 on a successful remote build,
// and the check also catches a genuine remote failure. Written config-cache-clean
// (injected ExecOperations, config-time inputs) so it stays safe if the configuration
// cache is enabled later.
abstract class RemoteAssembleTask extends DefaultTask {
    @Input abstract Property<String> getAssembleTaskName()
    @Internal abstract DirectoryProperty getRepoRoot()   // holds gradlew; the nested build's CWD
    @Internal abstract DirectoryProperty getApkDir()      // build/outputs/apk/<flavor>/<buildType>

    protected final ExecOperations execOps

    @Inject
    RemoteAssembleTask(ExecOperations execOps) { this.execOps = execOps }

    // The single @TaskAction for this hierarchy. Subclasses extend it by overriding
    // onApkBuilt rather than adding a second action, so there is never any ambiguity
    // about how many actions Gradle runs.
    @TaskAction
    void run() {
        File rootDir = repoRoot.get().asFile
        File gradlew = new File(rootDir, "gradlew")

        // 1. Compile remotely. This nested invocation's "assemble…" name isn't force-local,
        //    so Mirakle runs it on boson and rsyncs the APK back. Tee the log so it stays
        //    visible AND checkable; ignore the exit code and judge success by BUILD SUCCESSFUL.
        def captured = new ByteArrayOutputStream()
        def tee = new OutputStream() {
            @Override void write(int b) { System.out.write(b); captured.write(b) }
            @Override void write(byte[] b, int off, int len) { System.out.write(b, off, len); captured.write(b, off, len) }
            @Override void flush() { System.out.flush() }
        }
        execOps.exec {
            it.workingDir = rootDir
            it.commandLine gradlew.absolutePath, assembleTaskName.get()
            it.standardOutput = tee
            it.errorOutput = tee
            it.ignoreExitValue = true
        }
        if (!captured.toString().contains("BUILD SUCCESSFUL")) {
            throw new GradleException("Remote assemble (${assembleTaskName.get()}) did not report BUILD SUCCESSFUL — see the log above.")
        }

        // 2. Pick the built APK. RenameApksTask wipes stale APKs from the output dir, so
        //    exactly one is expected; if several survive, take the newest.
        File dir = apkDir.get().asFile
        List<File> apks = (dir.listFiles()?.findAll { it.name.endsWith(".apk") } ?: []).toList()
        if (apks.isEmpty()) {
            throw new GradleException("No APKs in ${dir}; the remote assemble reported success but produced no APK.")
        }
        File chosen = apks.max { it.lastModified() }
        if (apks.size() > 1) {
            logger.lifecycle("${apks.size()} APKs in ${dir}; using the newest (${chosen.name}).")
        }

        onApkBuilt(chosen)
    }

    // What to do with the APK once it is back on this machine. Assembling alone just
    // reports where it landed.
    protected void onApkBuilt(File apk) {
        logger.lifecycle("Built ${apk.name} in ${apk.parentFile}.")
    }
}

abstract class RemoteInstallTask extends RemoteAssembleTask {
    @Internal abstract Property<String> getAdbExecutable()

    @Inject
    RemoteInstallTask(ExecOperations execOps) { super(execOps) }

    // 3. Install with the local SDK's adb.
    @Override
    protected void onApkBuilt(File apk) {
        logger.lifecycle("Installing ${apk.name} on the connected device…")
        execOps.exec {
            it.commandLine adbExecutable.get(), "install", "-r", apk.absolutePath
        }
    }
}

// Variant task-name suffix -> the APK output subdirectory AGP writes for it.
def remoteVariants = [
    WithGPlayDebug  : "withGPlay/debug",
    WithGPlayRelease: "withGPlay/release",
    NoGPlayDebug    : "noGPlay/debug",
    NoGPlayRelease  : "noGPlay/release",
]
// AGP 9's new DSL no longer exposes android.sdkDirectory, so resolve adb ourselves:
// local.properties(sdk.dir) → ANDROID_HOME/ANDROID_SDK_ROOT → bare "adb" on PATH.
def sdkAdbPath = {
    def localProps = rootProject.file("local.properties")
    def sdkDir = null
    if (localProps.exists()) {
        def p = new Properties()
        localProps.withInputStream { p.load(it) }
        sdkDir = p.getProperty("sdk.dir")
    }
    sdkDir = sdkDir ?: System.getenv("ANDROID_HOME") ?: System.getenv("ANDROID_SDK_ROOT")
    if (sdkDir) {
        def adb = new File(sdkDir, "platform-tools/adb")
        if (adb.exists()) return adb.absolutePath
    }
    return "adb" // fall back to PATH
}()
remoteVariants.each { suffix, apkPath ->
    tasks.register("assemble${suffix}Remote", RemoteAssembleTask) {
        it.group = "build (remote build)"
        it.description = "Compiles the ${suffix} APK on the Mirakle remote host and leaves it in build/outputs/apk/${apkPath}."
        it.assembleTaskName.set(":app:assemble${suffix}".toString())
        it.repoRoot.set(rootProject.layout.projectDirectory)
        it.apkDir.set(layout.buildDirectory.dir("outputs/apk/${apkPath}"))
    }
    tasks.register("install${suffix}Remote", RemoteInstallTask) {
        it.group = "install (remote build)"
        it.description = "Compiles the ${suffix} APK on the Mirakle remote host, then installs it on the connected device via local adb."
        it.assembleTaskName.set(":app:assemble${suffix}".toString())
        it.adbExecutable.set(sdkAdbPath)
        it.repoRoot.set(rootProject.layout.projectDirectory)
        it.apkDir.set(layout.buildDirectory.dir("outputs/apk/${apkPath}"))
    }
}
